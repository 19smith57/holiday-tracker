<title>My Holiday Tracker</title>

<style>
:root {
  --ink: #1a1f2e;
  --ink-mid: #3d4a5c;
  --ink-light: #7a8b9a;
  --page: #f7f4ef;
  --page-dark: #ede9e2;
  --page-darker: #e0dbd2;
  --azure: #1e5f8e;
  --azure-light: #c8dff0;
  --coral: #d4603a;
  --coral-light: #f5e0d8;
  --gold: #b8963e;
  --gold-light: #f2e9d0;
  --sage: #4a7c6f;
  --sage-light: #d4e8e4;
  --white: #ffffff;
  --shadow: 0 4px 20px rgba(26,31,46,0.10);
  --shadow-lg: 0 8px 40px rgba(26,31,46,0.15);
  --radius: 14px;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  background: var(--page);
  color: var(--ink);
  min-height: 100vh;
}

/* ── HEADER ── */
.app-header {
  background: var(--ink);
  padding: 24px 36px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  position: sticky;
  top: 0;
  z-index: 100;
  box-shadow: 0 2px 20px rgba(0,0,0,0.3);
}
.app-title {
  font-family: Georgia, 'Times New Roman', serif;
  font-size: 1.7rem;
  font-weight: 600;
  color: var(--white);
  letter-spacing: 0.5px;
}
.app-title span { color: #a8c8e0; }
.header-actions { display: flex; gap: 10px; align-items: center; }
.btn {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  font-size: 0.82rem;
  font-weight: 500;
  padding: 9px 18px;
  border-radius: 8px;
  border: none;
  cursor: pointer;
  transition: all 0.2s;
  letter-spacing: 0.3px;
}
.btn-primary { background: var(--azure); color: white; }
.btn-primary:hover { background: #1a5070; transform: translateY(-1px); box-shadow: 0 4px 12px rgba(30,95,142,0.4); }
.btn-ghost { background: rgba(255,255,255,0.1); color: white; border: 1px solid rgba(255,255,255,0.2); }
.btn-ghost:hover { background: rgba(255,255,255,0.18); }
.btn-sm { padding: 6px 12px; font-size: 0.78rem; }
.btn-danger { background: #c0392b; color: white; }
.btn-danger:hover { background: #a93226; }
.btn-secondary { background: var(--page-dark); color: var(--ink); }
.btn-secondary:hover { background: var(--page-darker); }

/* ── TABS ── */
.view-tabs {
  background: var(--ink-mid);
  padding: 0 36px;
  display: flex;
  gap: 0;
}
.view-tab {
  padding: 11px 22px;
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  font-size: 0.82rem;
  font-weight: 500;
  color: rgba(255,255,255,0.5);
  background: none;
  border: none;
  cursor: pointer;
  border-bottom: 2px solid transparent;
  transition: all 0.2s;
  letter-spacing: 0.5px;
}
.view-tab:hover { color: rgba(255,255,255,0.8); }
.view-tab.active { color: white; border-bottom-color: #a8c8e0; }

/* ── MAIN ── */
.main { padding: 28px 36px; max-width: 1300px; }

/* ── SORT / FILTER BAR ── */
.bar {
  display: flex;
  align-items: center;
  gap: 12px;
  margin-bottom: 24px;
  flex-wrap: wrap;
}
.bar-label { font-size: 0.78rem; color: var(--ink-light); font-weight: 500; letter-spacing: 0.5px; text-transform: uppercase; }
.holiday-count {
  font-size: 0.82rem;
  background: var(--azure-light);
  color: var(--azure);
  padding: 4px 12px;
  border-radius: 20px;
  font-weight: 600;
  margin-left: auto;
}

/* ── VIEW PANELS ── */
.view-panel { display: none; }
.view-panel.active { display: block; }

/* ── CARDS ── */
.cards-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
  gap: 20px;
}

.hol-card {
  background: white;
  border-radius: var(--radius);
  box-shadow: var(--shadow);
  overflow: hidden;
  transition: transform 0.2s, box-shadow 0.2s;
  cursor: pointer;
}
.hol-card:hover { transform: translateY(-3px); box-shadow: var(--shadow-lg); }

.card-stripe {
  height: 5px;
}
.stripe-future { background: linear-gradient(90deg, var(--coral), var(--gold)); }
.stripe-past   { background: linear-gradient(90deg, var(--azure), var(--sage)); }

.card-main { padding: 20px 22px 0; }
.card-top {
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
  margin-bottom: 6px;
}
.card-dest {
  font-family: Georgia, 'Times New Roman', serif;
  font-size: 1.35rem;
  font-weight: 700;
  color: var(--ink);
  line-height: 1.2;
  flex: 1;
}
.status-pill {
  font-size: 0.68rem;
  font-weight: 600;
  letter-spacing: 0.8px;
  text-transform: uppercase;
  padding: 3px 10px;
  border-radius: 20px;
  margin-left: 10px;
  white-space: nowrap;
}
.pill-future { background: var(--coral-light); color: var(--coral); }
.pill-past   { background: var(--sage-light); color: var(--sage); }

.card-dates { font-size: 0.82rem; color: var(--ink-light); margin-bottom: 14px; }

.card-section-title {
  font-size: 0.68rem;
  font-weight: 600;
  letter-spacing: 1.2px;
  text-transform: uppercase;
  color: var(--ink-light);
  margin: 12px 0 6px;
}


/* ── CATEGORY PILLS ── */
.cat-pills {
  display: -webkit-flex;
  display: flex;
  -webkit-flex-wrap: wrap;
  flex-wrap: wrap;
  gap: 7px;
  margin: 14px 0 4px;
}
.cat-pill {
  display: -webkit-inline-flex;
  display: inline-flex;
  -webkit-align-items: center;
  align-items: center;
  gap: 5px;
  padding: 5px 12px;
  border-radius: 20px;
  font-size: 0.77rem;
  font-weight: 500;
  border: 1.5px solid transparent;
  cursor: pointer;
  transition: all 0.18s;
  background: none;
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  -webkit-appearance: none;
  appearance: none;
}
.cat-pill.has-data {
  background: var(--azure-light);
  color: var(--azure);
  border-color: #b0d0e8;
}
.cat-pill.has-data:hover {
  background: #b0d0e8;
  transform: translateY(-1px);
}
.cat-pill.has-data.open {
  background: var(--azure);
  color: white;
  border-color: var(--azure);
}
.cat-pill.no-data {
  background: var(--page);
  color: var(--ink-light);
  border-color: var(--page-darker);
  cursor: default;
  opacity: 0.6;
}
.pill-chevron {
  font-size: 0.6rem;
  transition: transform 0.2s;
}
.cat-pill.open .pill-chevron { transform: rotate(180deg); }

.cat-detail {
  background: var(--page);
  border-radius: 10px;
  padding: 12px 14px;
  margin: 6px 0 8px;
  font-size: 0.8rem;
  animation: fadeIn 0.15s ease;
}
.cat-detail.open { display: block; }
@keyframes fadeIn { from { opacity: 0; transform: translateY(-4px); } to { opacity: 1; transform: translateY(0); } }

.detail-row {
  display: flex;
  justify-content: space-between;
  align-items: baseline;
  padding: 4px 0;
  border-bottom: 1px solid var(--page-darker);
}
.detail-row:last-child { border-bottom: none; }
.detail-label { color: var(--ink-light); font-size: 0.75rem; min-width: 90px; }
.detail-value { color: var(--ink-mid); text-align: right; }
.detail-cost  { color: var(--azure); font-weight: 600; }

/* Legs (hotels for road trip) */
.legs-list { list-style: none; }
.leg-item {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 6px 0;
  border-bottom: 1px solid var(--page-darker);
  font-size: 0.8rem;
}
.leg-item:last-child { border-bottom: none; }
.leg-hotel { font-weight: 500; }
.leg-location { color: var(--ink-light); font-size: 0.75rem; }
.leg-cost { font-weight: 600; color: var(--azure); white-space: nowrap; margin-left: 8px; }

/* Flights */
.flights-list { list-style: none; }
.flight-item {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 6px 0;
  border-bottom: 1px solid var(--page-darker);
  font-size: 0.79rem;
}
.flight-item:last-child { border-bottom: none; }
.flight-num { font-weight: 600; color: var(--azure); min-width: 55px; }
.flight-route { flex: 1; color: var(--ink-mid); }
.flight-cost { font-weight: 600; white-space: nowrap; }



/* ── PAYMENT BLOCK ── */
.payment-block {
  margin-top: 10px;
  background: white;
  border-radius: 8px;
  padding: 10px 12px;
  border: 1.5px solid var(--page-darker);
}
.payment-block-title {
  font-size: 0.68rem;
  font-weight: 700;
  letter-spacing: 1px;
  text-transform: uppercase;
  color: var(--ink-light);
  margin-bottom: 8px;
}
.balance-due   { color: var(--coral) !important; font-weight: 600 !important; }
.balance-paid  { color: var(--sage)  !important; font-weight: 600 !important; }

/* Card footer */
.card-footer {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 14px 22px;
  margin-top: 14px;
  border-top: 1px solid var(--page-dark);
}
.total-label { font-size: 0.75rem; color: var(--ink-light); text-transform: uppercase; letter-spacing: 0.8px; }
.total-cost { font-family: Georgia, 'Times New Roman', serif; font-size: 1.5rem; font-weight: 700; color: var(--ink); }
.card-actions { display: flex; gap: 6px; }

/* ── TABLE VIEW ── */
.table-wrap {
  background: white;
  border-radius: var(--radius);
  box-shadow: var(--shadow);
  overflow-x: auto;
}
table { width: 100%; border-collapse: collapse; font-size: 0.83rem; }
thead tr { background: var(--ink); color: white; }
thead th {
  padding: 13px 14px;
  text-align: left;
  font-weight: 500;
  font-size: 0.75rem;
  letter-spacing: 0.5px;
  white-space: nowrap;
}
tbody tr { border-bottom: 1px solid var(--page); transition: background 0.15s; }
tbody tr:last-child { border-bottom: none; }
tbody tr:hover { background: #faf8f5; }
tbody td { padding: 11px 14px; vertical-align: middle; }
.td-dest { font-weight: 600; font-size: 0.9rem; }
.td-small { font-size: 0.77rem; color: var(--ink-light); }
.td-cost { font-weight: 600; color: var(--azure); }
.td-total { font-weight: 700; font-size: 1rem; color: var(--ink); }
.tick { color: var(--sage); }
.dash { color: var(--page-darker); }
tfoot tr { background: var(--page-dark); }
tfoot td { padding: 11px 14px; font-weight: 600; }

/* ── EMPTY STATE ── */
.empty-state {
  text-align: center;
  padding: 80px 20px;
  color: var(--ink-light);
}
.empty-icon { font-size: 3.5rem; margin-bottom: 16px; }
.empty-state h2 { font-family: Georgia, 'Times New Roman', serif; font-size: 1.6rem; color: var(--ink-mid); margin-bottom: 8px; }
.empty-state p { font-size: 0.88rem; margin-bottom: 24px; }

/* ── MODAL ── */
.modal-backdrop {
  display: none;
  position: fixed; inset: 0;
  background: rgba(26,31,46,0.6);
  z-index: 200;
  align-items: flex-start;
  justify-content: center;
  padding: 30px 16px;
  overflow-y: auto;
  backdrop-filter: blur(3px);
}
.modal-backdrop.open { display: flex; }
.modal {
  background: white;
  border-radius: 18px;
  width: 100%;
  max-width: 720px;
  box-shadow: var(--shadow-lg);
  animation: slideIn 0.25s ease;
  margin: auto;
}
@keyframes slideIn {
  from { opacity: 0; transform: translateY(-20px); }
  to   { opacity: 1; transform: translateY(0); }
}
.modal-header {
  padding: 22px 28px 18px;
  border-bottom: 1px solid var(--page-dark);
  display: flex;
  justify-content: space-between;
  align-items: center;
}
.modal-title {
  font-family: Georgia, 'Times New Roman', serif;
  font-size: 1.4rem;
  font-weight: 700;
}
.modal-close {
  background: none; border: none; font-size: 1.4rem;
  cursor: pointer; color: var(--ink-light); line-height: 1;
  padding: 4px 8px; border-radius: 6px;
}
.modal-close:hover { background: var(--page-dark); color: var(--ink); }
.modal-body { padding: 22px 28px; }
.modal-footer {
  padding: 16px 28px;
  border-top: 1px solid var(--page-dark);
  display: flex;
  gap: 10px;
  justify-content: flex-end;
}

/* ── FORM STYLES ── */
.form-section {
  margin-bottom: 24px;
  padding-bottom: 24px;
  border-bottom: 1px solid var(--page-dark);
}
.form-section:last-child { border-bottom: none; margin-bottom: 0; padding-bottom: 0; }
.form-section-title {
  font-size: 0.72rem;
  font-weight: 600;
  letter-spacing: 1.4px;
  text-transform: uppercase;
  color: var(--azure);
  margin-bottom: 14px;
}
.form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 12px; }
.form-row-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; margin-bottom: 10px; }
.form-col { display: flex; flex-direction: column; gap: 4px; }
.form-col.full { grid-column: 1 / -1; }
label { font-size: 0.75rem; font-weight: 600; color: var(--ink-light); letter-spacing: 0.4px; text-transform: uppercase; }
input, select, textarea {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  font-size: 0.88rem;
  padding: 9px 12px;
  border: 1.5px solid var(--page-darker);
  border-radius: 8px;
  background: var(--page);
  color: var(--ink);
  transition: border-color 0.2s;
  outline: none;
}
input:focus, select:focus, textarea:focus { border-color: var(--azure); background: white; }
textarea { resize: vertical; min-height: 60px; }

/* Repeating items (flights, hotels) */
.repeating-section { margin-top: 6px; }
.repeat-item {
  background: var(--page);
  border-radius: 10px;
  padding: 14px;
  margin-bottom: 10px;
  position: relative;
}
.repeat-item-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 10px;
}
.repeat-item-title { font-size: 0.78rem; font-weight: 600; color: var(--azure); text-transform: uppercase; letter-spacing: 0.8px; }
.btn-remove-item {
  background: none; border: none; color: var(--ink-light);
  cursor: pointer; font-size: 1.1rem; padding: 2px 6px;
  border-radius: 4px; transition: all 0.15s;
}
.btn-remove-item:hover { background: var(--coral-light); color: var(--coral); }
.btn-add-item {
  display: flex;
  align-items: center;
  gap: 6px;
  font-size: 0.8rem;
  font-weight: 500;
  color: var(--azure);
  background: var(--azure-light);
  border: none;
  padding: 8px 14px;
  border-radius: 8px;
  cursor: pointer;
  transition: all 0.2s;
  margin-top: 4px;
}
.btn-add-item:hover { background: #b0d0e8; }

/* ── CONFIRM DIALOG ── */
.confirm-backdrop {
  display: none;
  position: fixed; inset: 0;
  background: rgba(26,31,46,0.7);
  z-index: 300;
  align-items: center;
  justify-content: center;
}
.confirm-backdrop.open { display: flex; }
.confirm-box {
  background: white;
  border-radius: 14px;
  padding: 28px;
  max-width: 360px;
  width: 90%;
  text-align: center;
  box-shadow: var(--shadow-lg);
}
.confirm-box h3 { font-family: Georgia, 'Times New Roman', serif; font-size: 1.3rem; margin-bottom: 8px; }
.confirm-box p { font-size: 0.85rem; color: var(--ink-mid); margin-bottom: 20px; }
.confirm-btns { display: flex; gap: 10px; justify-content: center; }

/* ── TOAST ── */
.toast {
  position: fixed;
  bottom: 28px;
  right: 28px;
  background: var(--ink);
  color: white;
  padding: 12px 20px;
  border-radius: 10px;
  font-size: 0.85rem;
  font-weight: 500;
  z-index: 400;
  opacity: 0;
  transform: translateY(10px);
  transition: all 0.3s;
  pointer-events: none;
}
.toast.show { opacity: 1; transform: translateY(0); }
.toast.success { background: var(--sage); }

/* responsive */
@media (max-width: 600px) {
  .app-header { padding: 16px 18px; }
  .main { padding: 18px; }
  .form-row, .form-row-3 { grid-template-columns: 1fr; }
  .modal { border-radius: 14px; }
}
</style>

const STORAGE_KEY = 'holidayTrackerData_v1';

const GH_REPO = '19smith57/holiday-tracker';
const GH_FILE = 'data.json';
let _ghSha = null; // tracks current file SHA for updates

async function loadFromGitHub() {
  try {
    const r = await fetch('https://api.github.com/repos/' + GH_REPO + '/contents/' + GH_FILE, {
      headers: { 'Authorization': 'token ' + GH_TOKEN, 'Accept': 'application/vnd.github.v3+json' }
    });
    if (r.status === 404) return null; // file doesn't exist yet
    if (!r.ok) return null;
    const json = await r.json();
    _ghSha = json.sha;
    const decoded = JSON.parse(atob(json.content.split('\n').join('')));
    return decoded;
  } catch(e) { return null; }
}

async function saveToGitHub(data) {
  try {
    // If we don't have SHA yet, fetch it first
    if (!_ghSha) {
      const check = await fetch('https://api.github.com/repos/' + GH_REPO + '/contents/' + GH_FILE, {
        headers: { 'Authorization': 'token ' + GH_TOKEN, 'Accept': 'application/vnd.github.v3+json' }
      });
      if (check.ok) {
        const existing = await check.json();
        _ghSha = existing.sha;
      }
    }
    const body = {
      message: 'Update holidays',
      content: btoa(unescape(encodeURIComponent(JSON.stringify(data, null, 2)))),
      ..._ghSha ? { sha: _ghSha } : {}
    };
    const r = await fetch('https://api.github.com/repos/' + GH_REPO + '/contents/' + GH_FILE, {
      method: 'PUT',
      headers: { 'Authorization': 'token ' + GH_TOKEN, 'Accept': 'application/vnd.github.v3+json', 'Content-Type': 'application/json' },
      body: JSON.stringify(body)
    });
    if (r.ok) {
      const json = await r.json();
      _ghSha = json.content.sha;
      return true;
    }
    const errText = await r.text();
    showToast('GitHub error ' + r.status + ': ' + errText.substring(0,50), 'error');
    return false;
  } catch(e) { 
    showToast('GitHub exception: ' + e.message, 'error');
    return false; 
  }
}

function loadData() {
  // Try localStorage as quick start
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw && raw !== 'null') {
      const parsed = JSON.parse(raw);

async function syncFromGitHub() {
  const data = await loadFromGitHub();
  if (data && Array.isArray(data) && data.length > 0) {
    holidays = data;
    try { localStorage.setItem(STORAGE_KEY, JSON.stringify(data)); } catch(e) {}
    render();
    showToast('✔ Holidays synced', 'success');
  } else if (!data && holidays.length === JSON.parse(JSON.stringify(SEED_DATA)).length) {
    // No GitHub file yet - save current data to GitHub
    await saveToGitHub(holidays);
  }
}

function saveData(data) {
  // Save to localStorage as backup
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(data)); } catch(e) {}
  // Save to GitHub as primary store
  saveToGitHub(data).then(ok => {
    if (!ok) showToast('⚠ GitHub save failed - data saved locally only', 'error');
  });
}

// Load holidays — if URL has #share= use that data, otherwise use localStorage
// Always clear the hash so it doesn't affect future loads
let _isShareMode = window.location.hash.startsWith('#share=');
let holidays = (function() {
  if (_isShareMode) {
    try {
      const encoded = window.location.hash.slice(7);
      const data = JSON.parse(decodeURIComponent(escape(atob(encoded))));
      if (Array.isArray(data) && data.length > 0) {
        // Clear the hash so next load uses localStorage
        history.replaceState(null, '', window.location.pathname);
        return data;
      }
    } catch(e) {}
  }
  _isShareMode = false;
  return loadData();
})();

let currentSort = 'date';

// ══════════════════════════════════════
// UTILITIES
// ══════════════════════════════════════
function uid() {
  return Date.now().toString(36) + Math.random().toString(36).slice(2);
}

function fmt(dateStr) {
  if (!dateStr) return '—';
  const d = new Date(dateStr + 'T00:00:00');
  return d.toLocaleDateString('en-GB', { day: 'numeric', month: 'short', year: 'numeric' });
}

function nights(d1, d2) {
  if (!d1 || !d2) return '?';
  const diff = (new Date(d2) - new Date(d1)) / 86400000;
  return diff > 0 ? diff : '?';
}

function isFuture(dateStr) {
  if (!dateStr) return false;
  return new Date(dateStr + 'T00:00:00') >= new Date();
}

function totalCost(h) {
  let t = 0;
  // For cruise holidays the cruise payment covers flights, so don't double-count flight costs
  if (h.holidayType !== 'cruise') {
    (h.flights || []).forEach(f => t += parseFloat(f.cost || 0));
  }
  (h.hotels  || []).forEach(l => {
    const pt = paymentTotal(l.payment);
    t += pt > 0 ? pt : parseFloat(l.cost || 0);
  });
  t += parseFloat(h.carhire?.cost || 0);
  t += parseFloat(h.parking?.cost || 0);
  const kennelPt = paymentTotal(h.kennel?.payment);
  t += kennelPt > 0 ? kennelPt : parseFloat(h.kennel?.cost || 0);
  const cruisePt = paymentTotal(h.cruise?.payment);
  t += cruisePt > 0 ? cruisePt : parseFloat(h.cruise?.cost || 0);
  return t;
}

function fmtCost(n) {
  if (!n && n !== 0) return '—';
  return '£' + Number(n).toLocaleString('en-GB', { minimumFractionDigits: 0, maximumFractionDigits: 2 });
}

function showToast(msg, type = '') {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast show' + (type ? ' ' + type : '');
  setTimeout(() => { t.className = 'toast'; }, 2800);
}

function sortedHolidays() {
  const arr = [...holidays];
  if (currentSort === 'date') {
    arr.sort((a, b) => {
      const af = isFuture(a.startDate), bf = isFuture(b.startDate);
      if (af && !bf) return -1;
      if (!af && bf) return 1;
      if (af && bf) return new Date(a.startDate) - new Date(b.startDate);
      return new Date(b.startDate) - new Date(a.startDate);
    });
  } else if (currentSort === 'cost') {
    arr.sort((a, b) => totalCost(b) - totalCost(a));
  } else {
    arr.sort((a, b) => (a.destination || '').localeCompare(b.destination || ''));
  }
  return arr;
}

function setSort(s) {
  currentSort = s;
  document.querySelectorAll('[id^=sort-]').forEach(b => b.style.fontWeight = '');
  document.getElementById('sort-' + s).style.fontWeight = '700';
  render();
}

function switchView(name, btn) {
  document.querySelectorAll('.view-panel').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.view-tab').forEach(t => t.classList.remove('active'));
  document.getElementById('panel-' + name).classList.add('active');
  btn.classList.add('active');
  render();
}

            ${l.payment?.depositAmt || l.payment?.balanceAmt ? `<div style="width:100%;padding-left:2px">${paymentDetailRows(l.payment)}</div>` : ''}
          </li>`).join('')}
        </ul>
      </div>`;
    }

    // Car hire detail
    let carDetail = '';
    if (hasCar) {
      carDetail = `<div class="cat-detail" id="detail-${id}-car" style="display:none">
        ${h.carhire.company    ? `<div class="detail-row"><span class="detail-label">Company</span><span class="detail-value">${h.carhire.company}</span></div>` : ''}
        ${h.carhire.dropoff    ? `<div class="detail-row"><span class="detail-label">Drop-off</span><span class="detail-value">${fmt(h.carhire.dropoff)}${h.carhire.dropoffTime ? ' at ' + h.carhire.dropoffTime : ''}${h.carhire.dropoffLoc ? ' — ' + h.carhire.dropoffLoc : ''}</span></div>` : ''}
        ${h.carhire.pickup     ? `<div class="detail-row"><span class="detail-label">Pick-up</span><span class="detail-value">${fmt(h.carhire.pickup)}${h.carhire.pickupTime ? ' at ' + h.carhire.pickupTime : ''}${h.carhire.pickupLoc ? ' — ' + h.carhire.pickupLoc : ''}</span></div>` : ''}
        ${h.carhire.ref        ? `<div class="detail-row"><span class="detail-label">Booking Ref</span><span class="detail-value">${h.carhire.ref}</span></div>` : ''}
        ${h.carhire.cost       ? `<div class="detail-row"><span class="detail-label">Cost</span><span class="detail-value detail-cost">${fmtCost(h.carhire.cost)}</span></div>` : ''}
      </div>`;
    }

    // Parking detail
    let parkingDetail = '';
    if (hasParking) {
      parkingDetail = `<div class="cat-detail" id="detail-${id}-parking" style="display:none">
        ${h.parking.location   ? `<div class="detail-row"><span class="detail-label">Location</span><span class="detail-value">${h.parking.location}</span></div>` : ''}
        ${h.parking.dropoff    ? `<div class="detail-row"><span class="detail-label">Drop-off</span><span class="detail-value">${fmt(h.parking.dropoff)}${h.parking.dropoffTime ? ' at ' + h.parking.dropoffTime : ''}</span></div>` : ''}
        ${h.parking.pickup     ? `<div class="detail-row"><span class="detail-label">Pick-up</span><span class="detail-value">${fmt(h.parking.pickup)}${h.parking.pickupTime ? ' at ' + h.parking.pickupTime : ''}</span></div>` : ''}
        ${h.parking.ref        ? `<div class="detail-row"><span class="detail-label">Booking Ref</span><span class="detail-value">${h.parking.ref}</span></div>` : ''}
        ${h.parking.cost       ? `<div class="detail-row"><span class="detail-label">Cost</span><span class="detail-value detail-cost">${fmtCost(h.parking.cost)}</span></div>` : ''}
      </div>`;
    }

    // Kennel detail
    let kennelDetail = '';
    if (hasKennel) {
      const dropStr = h.kennel.dropoff ? `${fmt(h.kennel.dropoff)}${h.kennel.dropoffAmPm ? ' ' + h.kennel.dropoffAmPm : ''}` : '';
      const pickStr = h.kennel.pickup  ? `${fmt(h.kennel.pickup)}${h.kennel.pickupAmPm ? ' ' + h.kennel.pickupAmPm : ''}` : '';
      kennelDetail = `<div class="cat-detail" id="detail-${id}-kennel" style="display:none">

        ${dropStr        ? `<div class="detail-row"><span class="detail-label">Drop-off</span><span class="detail-value">${dropStr}</span></div>` : ''}
        ${pickStr        ? `<div class="detail-row"><span class="detail-label">Pick-up</span><span class="detail-value">${pickStr}</span></div>` : ''}
        ${h.kennel.ref   ? `<div class="detail-row"><span class="detail-label">Booking Ref</span><span class="detail-value">${h.kennel.ref}</span></div>` : ''}
        ${paymentDetailRows(h.kennel.payment)}
      </div>`;
    }

    // Build pill row — cruises get both a Cruise pill AND a Flights pill
    const isCruise = h.holidayType === 'cruise';
    const isRoadTrip = h.holidayType === 'roadtrip';

    const pillsHTML = `

      ${!isRoadTrip ? pill(`flights`, '✈',  `Flights${hasFlights ? ' (' + h.flights.length + ')' : ''}`, hasFlights) : ''}

      ${pill('car',     '🚗', 'Car Hire', hasCar)}

      ${pill('kennel',  '🐾', 'Kennel',   hasKennel)}
    `;

    const detailsHTML = `
      ${isCruise ? cruiseDetail : ''}

    return `<div class="hol-card" id="card-${id}">

      </div>

}

// ══════════════════════════════════════
// RENDER — TABLE
// ══════════════════════════════════════
function renderTable() {
  const data = sortedHolidays();
  const tbody = document.getElementById('table-body');
  const tfoot = document.getElementById('table-foot');

  if (!data.length) {
    tbody.innerHTML = `<tr><td colspan="10" style="text-align:center;padding:40px;color:var(--ink-light)">No holidays recorded yet.</td></tr>`;
    tfoot.innerHTML = '';
    return;
  }

  let grandTotal = 0;
  tbody.innerHTML = data.map(h => {
    const cost = totalCost(h);
    grandTotal += cost;
    const fl = h.flights?.length || 0;
    const ho = h.hotels?.length || 0;
    return `<tr>
      <td class="td-dest">${h.destination || '—'}</td>
      <td>${fmt(h.startDate)} – ${fmt(h.endDate)}</td>
      <td>${nights(h.startDate, h.endDate)}</td>
      <td>${fl ? `<span class="tick">✔</span> <span class="td-small">${fl} flight${fl>1?'s':''}</span>` : (h.holidayType === 'cruise' ? `<span class="td-small" style="color:var(--ink-light)">🚢 cruise</span>` : h.holidayType === 'roadtrip' ? `<span class="td-small" style="color:var(--ink-light)">road trip</span>` : '<span class="dash">—</span>')}</td>
      <td>${ho ? `<span class="tick">✔</span> <span class="td-small">${ho} hotel${ho>1?'s':''}</span>` : '<span class="dash">—</span>'}</td>
      <td>${h.carhire?.cost || h.carhire?.ref ? '<span class="tick">✔</span>' : '<span class="dash">—</span>'}</td>
      <td>${h.parking?.cost || h.parking?.ref ? '<span class="tick">✔</span>' : '<span class="dash">—</span>'}</td>
      <td>${h.kennel?.name || h.kennel?.cost || h.kennel?.ref || h.kennel?.dropoff ? '<span class="tick">✔</span>' : '<span class="dash">—</span>'}</td>
      <td class="td-cost td-total">${fmtCost(cost)}</td>
      <td>
        <button class="btn btn-secondary btn-sm" onclick="openEditModal('${h.id}')">✏</button>
        <button class="btn btn-danger btn-sm" onclick="askDelete('${h.id}')" style="margin-left:4px">🗑</button>
      </td>
    </tr>`;
  }).join('');

  tfoot.innerHTML = `<tr>
    <td colspan="8" style="text-align:right;letter-spacing:0.5px;text-transform:uppercase;font-size:0.78rem;color:var(--ink-light)">Grand Total</td>
    <td class="td-total">${fmtCost(grandTotal)}</td>
    <td></td>
  </tr>`;
}

function render() {
  const count = holidays.length;
  document.getElementById('holiday-count').textContent = count + ' holiday' + (count !== 1 ? 's' : '');
  renderCards();
  renderTable();
}

// DEPOSIT / BALANCE HELPER
// ══════════════════════════════════════
function depositFields(prefix, p) {
  // p = existing payment object e.g. h?.cruise?.payment
  return `<div class="payment-block">
    <div class="payment-block-title">💳 Deposit &amp; Balance</div>
    <div class="form-row">
      <div class="form-col">
        <label>Deposit Amount (£)</label>
        <input type="number" id="${prefix}-dep-amt" value="${p?.depositAmt || ''}" placeholder="0.00" min="0" step="0.01">
      </div>
      <div class="form-col">
        <label>Deposit Date Paid</label>
        <input type="date" id="${prefix}-dep-date" value="${p?.depositDate || ''}">
      </div>
    </div>
    <div class="form-row">
      <div class="form-col">
        <label>Balance Amount (£)</label>
        <input type="number" id="${prefix}-bal-amt" value="${p?.balanceAmt || ''}" placeholder="0.00" min="0" step="0.01">
      </div>
      <div class="form-col">
        <label>Balance Due Date</label>
        <input type="date" id="${prefix}-bal-due" value="${p?.balanceDue || ''}">
      </div>
    </div>
    <div class="form-row">
      <div class="form-col">
        <label>Balance Paid Date</label>
        <input type="date" id="${prefix}-bal-paid" value="${p?.balancePaid || ''}">
      </div>
    </div>
  </div>`;
}

function collectPayment(prefix) {
  return {
    depositAmt:  document.getElementById(`${prefix}-dep-amt`)?.value  || '',
    depositDate: document.getElementById(`${prefix}-dep-date`)?.value || '',
    balanceAmt:  document.getElementById(`${prefix}-bal-amt`)?.value  || '',
    balanceDue:  document.getElementById(`${prefix}-bal-due`)?.value  || '',
    balancePaid: document.getElementById(`${prefix}-bal-paid`)?.value || '',
  };
}

function paymentTotal(p) {
  if (!p) return 0;
  // Use deposit + balance if set, otherwise fall back to a single cost field
  const d = parseFloat(p.depositAmt || 0);
  const b = parseFloat(p.balanceAmt || 0);
  return d + b;
}

function paymentDetailRows(p) {
  if (!p) return '';
  let rows = '';
  if (p.depositAmt)  rows += `<div class="detail-row"><span class="detail-label">Deposit</span><span class="detail-value detail-cost">${fmtCost(p.depositAmt)}${p.depositDate ? ' — paid ' + fmt(p.depositDate) : ''}</span></div>`;
  if (p.balanceAmt) {
    const isPaid = !!p.balancePaid;
    const isOverdue = p.balanceDue && !isPaid && new Date(p.balanceDue + 'T00:00:00') < new Date();
    const cls = isPaid ? 'balance-paid' : isOverdue ? 'balance-due' : '';
    const note = isPaid ? ' — paid ' + fmt(p.balancePaid) : p.balanceDue ? ' — due ' + fmt(p.balanceDue) : '';
    rows += `<div class="detail-row"><span class="detail-label">Balance</span><span class="detail-value ${cls}">${fmtCost(p.balanceAmt)}${note}</span></div>`;
  }
  return rows;
}

        <input type="date" name="fl-date" value="${f?.depDate || ''}">
      </div>
      <div class="form-col">
        <label>Departure Time</label>
        <input type="time" name="fl-time" value="${f?.depTime || ''}">
      </div>
      <div class="form-col">
        <label>Arrival Time</label>
        <input type="time" name="fl-arrtime" value="${f?.arrTime || ''}">
      </div>
    </div>
    <div class="form-row">
      <div class="form-col">
        <label>Cost (£)</label>
        <input type="number" name="fl-cost" value="${f?.cost || ''}" placeholder="0.00" min="0" step="0.01">
      </div>
    </div>
  </div>`;
}

function hotelBlock(l, i) {
  const uid = 'ht-' + Date.now() + '-' + Math.random().toString(36).slice(2);
  const payPrefix = 'ht-pay-' + uid;
  return `<div class="repeat-item" id="${uid}" data-pay-prefix="${payPrefix}">
    <div class="repeat-item-header">
      <span class="repeat-item-title">Hotel ${i + 1}</span>
      <button class="btn-remove-item" onclick="removeItem('${uid}')">✕</button>
    </div>
    <div class="form-row">
      <div class="form-col">
        <label>Hotel Name</label>
        <input type="text" name="ht-name" value="${l?.name || ''}">
      </div>
      <div class="form-col">
        <label>Town / Location</label>
        <input type="text" name="ht-location" value="${l?.location || ''}">
      </div>
    </div>
    <div class="form-row-3">
      <div class="form-col">
        <label>Check-in</label>
        <input type="date" name="ht-checkin" value="${l?.checkIn || ''}">
      </div>
      <div class="form-col">
        <label>Check-out</label>
        <input type="date" name="ht-checkout" value="${l?.checkOut || ''}">
      </div>
      <div class="form-col">
        <label>Cost (£)</label>
        <input type="number" name="ht-cost" value="${l?.cost || ''}" placeholder="0.00" min="0" step="0.01">
      </div>
    </div>
    <div class="form-col">
      <label>Booking Reference</label>
      <input type="text" name="ht-ref" value="${l?.ref || ''}">
    </div>
    ${depositFields(payPrefix, l?.payment)}
  </div>`;
}

function addFlight() {
  const c = document.getElementById('flights-container');
  const idx = c.querySelectorAll('.repeat-item').length;
  c.insertAdjacentHTML('beforeend', flightBlock({}, idx));
}

function addHotel() {
  const c = document.getElementById('hotels-container');
  const idx = c.querySelectorAll('.repeat-item').length;
  c.insertAdjacentHTML('beforeend', hotelBlock({}, idx));
}

function removeItem(id) {
  const el = document.getElementById(id);
  if (el) el.remove();
}

// ══════════════════════════════════════
// COLLECT FORM DATA
// ══════════════════════════════════════
function collectForm() {
  // Flights
  const flightItems = document.querySelectorAll('#flights-container .repeat-item');
  const flights = Array.from(flightItems).map(item => ({
    flightNum: item.querySelector('[name="fl-num"]').value.trim(),
    airline:   item.querySelector('[name="fl-airline"]').value.trim(),
    ref:       item.querySelector('[name="fl-ref"]').value.trim(),
    depAirport:item.querySelector('[name="fl-dep"]').value.trim(),
    arrAirport:item.querySelector('[name="fl-arr"]').value.trim(),
    depDate:   item.querySelector('[name="fl-date"]').value,
    depTime:   item.querySelector('[name="fl-time"]').value,
    arrTime:   item.querySelector('[name="fl-arrtime"]').value,
    cost:      item.querySelector('[name="fl-cost"]').value,
  })).filter(f => f.flightNum || f.depAirport || f.arrAirport || f.cost);

  // Hotels
  const hotelItems = document.querySelectorAll('#hotels-container .repeat-item');
  const hotels = Array.from(hotelItems).map(item => {
    const pp = item.dataset.payPrefix;
    return {
      name:     item.querySelector('[name="ht-name"]').value.trim(),
      location: item.querySelector('[name="ht-location"]').value.trim(),
      checkIn:  item.querySelector('[name="ht-checkin"]').value,
      checkOut: item.querySelector('[name="ht-checkout"]').value,
      cost:     item.querySelector('[name="ht-cost"]').value,
      ref:      item.querySelector('[name="ht-ref"]').value.trim(),
      payment:  collectPayment(pp),
    };
  }).filter(l => l.name || l.location || l.cost);

  return {
    destination: document.getElementById('f-destination').value.trim(),
    startDate:   document.getElementById('f-startDate').value,
    endDate:     document.getElementById('f-endDate').value,
    notes:       document.getElementById('f-notes').value.trim(),
    flights,
    hotels,
    carhire: {
      company:     document.getElementById('f-car-company').value.trim(),
      ref:         document.getElementById('f-car-ref').value.trim(),
      dropoff:     document.getElementById('f-car-dropoff').value,
      dropoffTime: document.getElementById('f-car-dropoff-time').value,
      dropoffLoc:  document.getElementById('f-car-dropoff-loc').value.trim(),
      pickup:      document.getElementById('f-car-pickup').value,
      pickupTime:  document.getElementById('f-car-pickup-time').value,
      pickupLoc:   document.getElementById('f-car-pickup-loc').value.trim(),
      cost:        document.getElementById('f-car-cost').value,
    },
    parking: {
      location:    document.getElementById('f-park-location').value.trim(),
      ref:         document.getElementById('f-park-ref').value.trim(),
      dropoff:     document.getElementById('f-park-dropoff').value,
      dropoffTime: document.getElementById('f-park-dropoff-time').value,
      pickup:      document.getElementById('f-park-pickup').value,
      pickupTime:  document.getElementById('f-park-pickup-time').value,
      cost:        document.getElementById('f-park-cost').value,
    },
    kennel: {
      name:         document.getElementById('f-kennel-name').value.trim(),
      ref:          document.getElementById('f-kennel-ref').value.trim(),
      dropoff:      document.getElementById('f-kennel-dropoff').value,
      dropoffAmPm:  document.getElementById('f-kennel-dropoff-ampm').value,
      pickup:       document.getElementById('f-kennel-pickup').value,
      pickupAmPm:   document.getElementById('f-kennel-pickup-ampm').value,
      payment:      collectPayment('kennel'),
    },
    holidayType: document.getElementById('f-holiday-type').value,
    cruise: {
      line:    document.getElementById('f-cruise-line')?.value.trim()  || '',
      ship:    document.getElementById('f-cruise-ship')?.value.trim()  || '',
      port:    document.getElementById('f-cruise-port')?.value.trim()  || '',
      ref:     document.getElementById('f-cruise-ref')?.value.trim()   || '',
      cabin:   document.getElementById('f-cruise-cabin')?.value.trim() || '',
      payment: collectPayment('cruise'),
    },
  };
}

// ══════════════════════════════════════
// OPEN / CLOSE MODAL
// ══════════════════════════════════════
function openAddModal() {
  editingId = null;
  document.getElementById('modal-title').textContent = 'Add Holiday';
  document.getElementById('modal-body').innerHTML = buildForm(null);
  document.getElementById('modal-backdrop').style.display = 'flex';
}

function openEditModal(id) {
  editingId = id;
  const h = holidays.find(x => x.id === id);
  if (!h) return;
  document.getElementById('modal-title').textContent = 'Edit: ' + (h.destination || 'Holiday');
  document.getElementById('modal-body').innerHTML = buildForm(h);
  document.getElementById('modal-backdrop').style.display = 'flex';
}

function closeModal() {
  document.getElementById('modal-backdrop').style.display = 'none';
  editingId = null;
}

function handleBackdropClick(e) {
  if (e.target === document.getElementById('modal-backdrop')) closeModal();
}

// ══════════════════════════════════════
// SAVE
// ══════════════════════════════════════
function saveHoliday() {
  const data = collectForm();
  if (!data.destination) { showToast('Please enter a destination.'); return; }

  if (editingId) {
    const idx = holidays.findIndex(h => h.id === editingId);
    if (idx >= 0) { holidays[idx] = { ...data, id: editingId }; }
  } else {
    holidays.push({ ...data, id: uid() });
  }

  saveData(holidays);
  closeModal();
  render();
  showToast(editingId ? '✔ Holiday updated' : '✔ Holiday added', 'success');
}

// ══════════════════════════════════════
// DELETE
// ══════════════════════════════════════
function askDelete(id) {
  deleteId = id;
  document.getElementById('confirm-backdrop').style.display = 'flex';
}

function closeConfirm() {
  document.getElementById('confirm-backdrop').style.display = 'none';
  deleteId = null;
}

function confirmDelete() {
  if (!deleteId) return;
  holidays = holidays.filter(h => h.id !== deleteId);
  saveData(holidays);
  closeConfirm();
  render();
  showToast('Holiday deleted');
}

// ══════════════════════════════════════
// EXPORT CSV
// ══════════════════════════════════════
function exportCSV() {
  if (!holidays.length) { showToast('No holidays to export'); return; }
  const rows = [['Destination','Start Date','End Date','Nights','Flights','Hotels','Car Hire Cost','Parking Cost','Kennel Cost','Total Cost','Notes']];
  holidays.forEach(h => {
    rows.push([
      h.destination || '',
      h.startDate || '',
      h.endDate || '',
      nights(h.startDate, h.endDate),
      (h.flights || []).map(f => `${f.flightNum || ''} ${f.depAirport || ''}→${f.arrAirport || ''}`).join('; '),
      (h.hotels || []).map(l => `${l.name || ''}${l.location ? ' (' + l.location + ')' : ''}`).join('; '),
      h.carhire?.cost || '',
      h.parking?.cost || '',
      h.kennel?.cost || '',
      totalCost(h),
      h.notes || ''
    ]);
  });
  const csv = rows.map(r => r.map(v => `"${String(v).replace(/"/g,'""')}"`).join(',')).join('\n');
  const a = document.createElement('a');
  a.href = 'data:text/csv;charset=utf-8,' + encodeURIComponent(csv);
  a.download = 'holidays.csv';
  a.click();
  showToast('CSV exported', 'success');
}

function toggleDetail(key) {
  const detail = document.getElementById('detail-' + key);
  const pill   = document.getElementById('pill-'   + key);
  if (!detail || !pill) return;
  const isOpen = detail.style.display === 'block';
  detail.style.display = isOpen ? 'none' : 'block';
  pill.classList.toggle('open', !isOpen);
}

// ══════════════════════════════════════
// SHARE SNAPSHOT
// ══════════════════════════════════════
function shareSnapshot() {
  // Use the in-memory holidays array — this is always the most current
  // (saveData is called every time a holiday is added/edited/deleted)
  const data = holidays;
  if (!data.length) { showToast('No holidays to share'); return; }

  const encoded = btoa(unescape(encodeURIComponent(JSON.stringify(data))));
  // Use a clean base URL with no existing hash
  const baseUrl = window.location.origin + window.location.pathname;
  const url = baseUrl + '#share=' + encoded;

  // Use native iOS share sheet
  if (navigator.share) {
    navigator.share({
      title: 'Our Holidays',
      text: 'Here are our ' + data.length + ' holidays',
      url: url
    }).catch(() => {});
  } else {
    // Fallback for non-iOS
    navigator.clipboard.writeText(url).then(() => {
      showToast('Link copied! (' + data.length + ' holidays)', 'success');
    }).catch(() => {
      showToast('Link: ' + url.substring(0, 50) + '...', 'success');
    });
  }
}

// ══════════════════════════════════════
// SHARED VIEW — runs if URL has #share=
// ══════════════════════════════════════
function checkShareMode() {
  // holidays already decoded from hash at startup
  // Just replace UI with read-only view
  document.body.innerHTML = `
    <header class="app-header">
      <div class="app-title">✈ Our <span>Holidays</span></div>
      <div style="font-size:0.75rem;color:var(--ink-light)">Shared view · read only</div>
    </header>
    <main class="main">
      <div class="cards-grid" id="cards-container"></div>
    </main>`;
  renderCards();
}

if (_isShareMode) {
  checkShareMode();
} else {
  render();
  syncFromGitHub();
}
